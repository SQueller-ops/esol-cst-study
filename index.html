<style>
:root{

  --shadow:0 10px 30px rgba(20,30,60,.08); --radius:18px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
header{background:linear-gradient(120deg,#14213d,#2d5be3);color:white;padding:30px 24px}
header h1{margin:0 0 8px;font-size:clamp(28px,4vw,48px);letter-spacing:-.04em}
header p{margin:0;max-width:1050px;color:#e7ebff;font-size:18px}
.app{display:grid;grid-template-columns:300px 1fr;gap:24px;max-width:1400px;margin:24px auto;padding:0 20px}
nav{position:sticky;top:16px;align-self:start;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:16px}
nav h2{font-size:14px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em;margin:6px 0 10px}
nav button, .button{width:100%;text-align:left;border:0;background:transparent;padding:11px 12px;border-radius:12px;color:var(--ink);font-weight:650;cursor:pointer}
nav button:hover,.button:hover{background:var(--accent2)}
nav button.active{background:var(--accent);color:white}
main{min-width:0}
.card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:22px;margin-bottom:20px}
.grid{display:grid;gap:16px}
.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.stat{background:#fbfcff;border:1px solid var(--line);border-radius:16px;padding:16px}
.stat .value{font-size:30px;font-weight:800;letter-spacing:-.03em}
.stat .label{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.progress{height:13px;background:#e9edf5;border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;background:var(--accent);width:0%}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent2);color:#2146ad;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:700;margin:3px}
.badge.good{background:#e7f6ed;color:var(--good)}
.badge.warn{background:#fff4e5;color:var(--warn)}
.badge.bad{background:#fee4e2;color:var(--bad)}
h2{font-size:28px;letter-spacing:-.035em;margin:0 0 12px}
h3{font-size:20px;margin:18px 0 8px}
h4{font-size:16px;margin:16px 0 7px}
p{margin:8px 0}
small,.muted{color:var(--muted)}
ul,ol{padding-left:24px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
tr:hover td{background:#fbfcff}
.lesson-row{cursor:pointer}
.lesson-row.done td:first-child::before{content:"✓ ";color:var(--good);font-weight:900}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0}
.controls button,.primary,.secondary,.danger{width:auto;border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}
.primary{background:var(--accent);color:white}
.secondary{background:var(--accent2);color:#2146ad}
.danger{background:#fee4e2;color:var(--bad)}
select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;background:white;color:var(--ink)}
textarea{min-height:110px;resize:vertical}
.quiz-choice{display:block;border:1px solid var(--line);padding:11px;border-radius:12px;margin:8px 0;cursor:pointer}
.quiz-choice input{width:auto;margin-right:8px}
.feedback{padding:12px;border-radius:12px;margin-top:10px;border:1px solid var(--line);background:#fbfcff}
.feedback.good{border-color:#a6d9b7;background:#ecfdf3}
.feedback.bad{border-color:#f2b8b5;background:#fff1f0}
.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#eef1f6;border:1px solid #d7dce8;border-radius:6px;padding:1px 6px}
.focusbar{display:grid;grid-template-columns:160px 1fr 70px;gap:10px;align-items:center;margin:10px 0}
.focusbar .bar{height:12px;background:#e9edf5;border-radius:99px;overflow:hidden}
.focusbar .bar span{display:block;height:100%;background:var(--accent)}
.source a{font-weight:800;color:#2146ad;text-decoration:none}
.source a:hover{text-decoration:underline}
.print-only{display:none}
@media(max-width:900px){
 .app{grid-template-columns:1fr}
 nav{position:relative;top:0}
 .grid.two,.grid.three{grid-template-columns:1fr}
 .focusbar{grid-template-columns:1fr}
}
@media print{
 body{background:white}
 header,nav,.controls,.no-print{display:none!important}
 .app{display:block;margin:0;padding:0}
 .card{box-shadow:none;border:1px solid #999;page-break-inside:avoid}
 .print-only{display:block}
}
</style>

<script>
const DATA = JSON.parse(document.getElementById('course-data').textContent);
const KEY = "nystce_esol_116_course_progress_v1";
let state = loadState();

function loadState(){
  try { return JSON.parse(localStorage.getItem(KEY)) || {lessons:{}, attempts:[]}; }
  catch(e){ return {lessons:{}, attempts:[]}; }
}
function saveState(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function pct(a,b){ return b ? Math.round((a/b)*100) : 0; }
function fmtDate(iso){
  const d = new Date(iso+"T12:00:00");
  return d.toLocaleDateString(undefined,{weekday:"short", month:"short", day:"numeric"});
}
function comp(id){ return DATA.competencies.find(c=>c.id===id); }
function completedCount(){ return Object.values(state.lessons).filter(x=>x.done).length; }
function latestLesson(){
  const incomplete = DATA.sessions.find(s=>!state.lessons[s.n]?.done);
  return incomplete || DATA.sessions[DATA.sessions.length-1];
}
function scoreByComp(){
  const stats = {};
  DATA.competencies.forEach(c=>stats[c.id]={correct:0,total:0,shortScore:0,shortTotal:0,done:0,possible:DATA.sessions.filter(s=>s.competency===c.id).length});
  DATA.sessions.forEach(s=>{
    if(state.lessons[s.n]?.done) stats[s.competency].done++;
  });
  state.attempts.forEach(a=>{
    if(!stats[a.competency]) return;
    if(a.type==="mc" || a.type==="fill"){
      stats[a.competency].total++;
      if(a.correct) stats[a.competency].correct++;
    }
    if(a.type==="short"){
      stats[a.competency].shortTotal+=2;
      stats[a.competency].shortScore += Number(a.score || 0);
    }
  });
  return stats;
}
function navTo(view, arg){
  document.querySelectorAll("nav button[data-view]").forEach(b=>b.classList.toggle("active", b.dataset.view===view));
  if(view==="dashboard") renderDashboard();
  if(view==="today") renderLesson(latestLesson().n);
  if(view==="plan") renderPlan();
  if(view==="competencies") renderCompetencies();
  if(view==="focus") renderFocus();
  if(view==="sources") renderSources();
  if(view==="lesson") renderLesson(arg);
}
document.querySelectorAll("nav button[data-view]").forEach(btn=>btn.addEventListener("click",()=>navTo(btn.dataset.view)));

function renderDashboard(){
  const done = completedCount();
  const next = latestLesson();
  const stats = scoreByComp();
  const weak = Object.entries(stats)
    .filter(([id,s])=>s.total+s.shortTotal>0)
    .map(([id,s])=>({id, score: Math.round(((s.correct)+(s.shortScore/2))/((s.total)+(s.shortTotal/2))*100)}))
    .sort((a,b)=>a.score-b.score).slice(0,3);
  document.getElementById("view").innerHTML = `
    <section class="card">
      <h2>Dashboard</h2>
      <p class="muted">This course is designed for steady preparation for the NYSTCE English to Speakers of Other Languages CST (116), with one 30-minute lesson each weekday.</p>
      <div class="grid three">
        <div class="stat"><div class="value">${done}/70</div><div class="label">Lessons Complete</div></div>
        <div class="stat"><div class="value">${pct(done,70)}%</div><div class="label">Course Progress</div></div>
        <div class="stat"><div class="value">Oct. 17</div><div class="label">Target Test Date</div></div>
      </div>
      <div style="margin-top:18px" class="progress"><span style="width:${pct(done,70)}%"></span></div>
    </section>
    <section class="card">
      <h2>Next Lesson</h2>
      <span class="badge">${next.day}, ${fmtDate(next.date)}</span>
      <span class="badge">${next.official}</span>
      <h3>${next.n}. ${next.topic}</h3>
      <p>${next.focus}</p>
      <div class="controls"><button class="primary" onclick="renderLesson(${next.n})">Start Lesson</button><button class="secondary" onclick="renderPlan()">View Full Plan</button></div>
    </section>
    <section class="card">
      <h2>Current Focus Areas</h2>
      ${weak.length ? weak.map(w=>`<span class="badge warn">${w.id}: ${w.score}%</span>`).join("") : `<p class="muted">Complete a few practice items and this section will show your lowest-scoring areas.</p>`}
      <p class="muted">Use the Focus Tracker after every few sessions. The goal is not just completion; it is identifying which competencies need more review.</p>
    </section>
  `;
}

function renderPlan(){
  const weeks = {};
  DATA.sessions.forEach(s=>{ (weeks[s.week] ||= []).push(s); });
  const rows = Object.entries(weeks).map(([week, arr])=>`
    <section class="card">
      <h2>Week ${week}</h2>
      <table>
        <thead><tr><th>Done</th><th>Date</th><th>Area</th><th>Topic</th></tr></thead>
        <tbody>
        ${arr.map(s=>`<tr class="lesson-row ${state.lessons[s.n]?.done?'done':''}" onclick="renderLesson(${s.n})">
          <td>${state.lessons[s.n]?.done?'Complete':'Open'}</td>
          <td>${fmtDate(s.date)}</td>
          <td><span class="badge">${s.competency}</span> ${s.area}</td>
          <td><strong>${s.n}. ${s.topic}</strong></td>
        </tr>`).join("")}
        </tbody>
      </table>
    </section>`).join("");
  document.getElementById("view").innerHTML = `
    <section class="card">
      <h2>70-Day Study Plan</h2>
      <p>Schedule: <strong>Monday–Friday, 30 minutes per day</strong>. Starting Monday, July 13 gives exactly 70 weekday sessions before the Friday review day on October 16.</p>
      <p class="muted">Click any row to open the lesson. Use the print button for a paper copy.</p>
    </section>${rows}`;
}

function renderCompetencies(){
  document.getElementById("view").innerHTML = `
    <section class="card">
      <h2>Exam Areas</h2>
      <p>The selected-response section is organized around the six competency areas below. The constructed-response section is practiced separately because it requires synthesis and written application.</p>
    </section>
    ${DATA.competencies.map(c=>`
      <section class="card">
        <h2>${c.id}: ${c.name}</h2>
        <p><span class="badge">${c.official}</span> <span class="badge ${c.id==='CR'?'warn':''}">${c.weight}</span></p>
        <p>${c.focus}</p>
        <h3>What to know</h3>
        <ul>${c.studyNotes.map(n=>`<li>${n}</li>`).join("")}</ul>
        <h3>Terms</h3>
        <p>${c.terms.map(t=>`<span class="badge">${t}</span>`).join("")}</p>
      </section>
    `).join("")}`;
}

function renderLesson(n){
  const s = DATA.sessions.find(x=>x.n===n);
  const q = s.question;
  const checked = state.lessons[n]?.done;
  document.querySelectorAll("nav button[data-view]").forEach(b=>b.classList.remove("active"));
  document.getElementById("view").innerHTML = `
    <section class="card">
      <div class="controls">
        <button class="secondary" onclick="renderLesson(${Math.max(1,n-1)})">← Previous</button>
        <button class="secondary" onclick="renderLesson(${Math.min(DATA.sessions.length,n+1)})">Next →</button>
        <button class="${checked?'secondary':'primary'}" onclick="toggleDone(${n})">${checked?'Mark Incomplete':'Mark Complete'}</button>
      </div>
      <span class="badge">${s.day}, ${fmtDate(s.date)}</span>
      <span class="badge">${s.official}</span>
      <span class="badge">${s.area}</span>
      <h2>Lesson ${s.n}: ${s.topic}</h2>
      <p>${s.focus}</p>
      <h3>30-Minute Structure</h3>
      <ol>${s.activityPlan.map(x=>`<li>${x}</li>`).join("")}</ol>
      <h3>Study Notes</h3>
      <ul>${s.notes.map(x=>`<li>${x}</li>`).join("")}</ul>
      <h3>Key Terms</h3>
      <p>${s.terms.map(t=>`<span class="badge">${t}</span>`).join("")}</p>
    </section>
    <section class="card">
      <h2>Assessment Practice</h2>
      <h3>Multiple Choice</h3>
      <p><strong>${q.mc}</strong></p>
      <form id="mcForm">${q.choices.map((c,i)=>`<label class="quiz-choice"><input type="radio" name="mc" value="${i}"> ${String.fromCharCode(65+i)}. ${c}</label>`).join("")}</form>
      <div class="controls"><button class="primary" onclick="gradeMC(${n})">Check Multiple Choice</button></div>
      <div id="mcFeedback"></div>
      <h3>Fill in the Blank</h3>
      <p><strong>${q.fill}</strong></p>
      <input id="fillAnswer" placeholder="Type your answer here">
      <div class="controls"><button class="primary" onclick="gradeFill(${n})">Check Fill-In</button></div>
      <div id="fillFeedback"></div>
      <h3>Short Answer</h3>
      <p><strong>${q.short}</strong></p>
      <textarea id="shortAnswer" placeholder="Write 3–5 focused sentences. Use classroom evidence, strategy, rationale, and assessment when possible."></textarea>
      <div class="controls">
        <button class="secondary" onclick="showModel(${n})">Show Model Answer</button>
        <button class="primary" onclick="saveShort(${n},2)">Self-Score 2/2</button>
        <button class="secondary" onclick="saveShort(${n},1)">Self-Score 1/2</button>
        <button class="secondary" onclick="saveShort(${n},0)">Self-Score 0/2</button>
      </div>
      <div id="shortFeedback"></div>
    </section>
  `;
}

function toggleDone(n){
  state.lessons[n] ||= {};
  state.lessons[n].done = !state.lessons[n].done;
  state.lessons[n].updated = new Date().toISOString();
  saveState();
  renderLesson(n);
}
function gradeMC(n){
  const s = DATA.sessions.find(x=>x.n===n);
  const chosen = document.querySelector('input[name="mc"]:checked');
  const box = document.getElementById("mcFeedback");
  if(!chosen){ box.innerHTML = `<div class="feedback bad">Choose an answer first.</div>`; return; }
  const correct = Number(chosen.value) === s.question.answer;
  state.attempts.push({lesson:n, competency:s.competency, type:"mc", correct, at:new Date().toISOString()});
  saveState();
  box.innerHTML = `<div class="feedback ${correct?'good':'bad'}"><strong>${correct?'Correct.':'Not quite.'}</strong> Correct answer: ${String.fromCharCode(65+s.question.answer)}. ${s.question.why}</div>`;
}
function normalize(x){ return (x||"").trim().toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," "); }
function gradeFill(n){
  const s = DATA.sessions.find(x=>x.n===n);
  const ans = normalize(document.getElementById("fillAnswer").value);
  const accepted = s.question.fillAnswers.map(normalize);
  const correct = accepted.includes(ans);
  state.attempts.push({lesson:n, competency:s.competency, type:"fill", correct, at:new Date().toISOString()});
  saveState();
  document.getElementById("fillFeedback").innerHTML = `<div class="feedback ${correct?'good':'bad'}"><strong>${correct?'Correct.':'Review this.'}</strong> Accepted answer: ${s.question.fillAnswers.join(" / ")}.</div>`;
}
function showModel(n){
  const s = DATA.sessions.find(x=>x.n===n);
  document.getElementById("shortFeedback").innerHTML = `<div class="feedback"><strong>Model answer:</strong><br>${s.question.model}</div>`;
}
function saveShort(n,score){
  const s = DATA.sessions.find(x=>x.n===n);
  state.attempts.push({lesson:n, competency:s.competency, type:"short", score, at:new Date().toISOString()});
  saveState();
  document.getElementById("shortFeedback").innerHTML = `<div class="feedback good"><strong>Saved self-score: ${score}/2.</strong><br><em>Model answer:</em> ${s.question.model}</div>`;
}

function renderFocus(){
  const stats = scoreByComp();
  const rows = DATA.competencies.map(c=>{
    const s = stats[c.id];
    const quizScore = s.total ? pct(s.correct,s.total) : null;
    const shortPct = s.shortTotal ? pct(s.shortScore,s.shortTotal) : null;
    const completion = pct(s.done,s.possible);
    const combinedDen = s.total + (s.shortTotal/2);
    const combinedNum = s.correct + (s.shortScore/2);
    const combined = combinedDen ? pct(combinedNum, combinedDen) : null;
    const width = combined ?? completion;
    return `<div class="focusbar">
      <div><strong>${c.id}</strong> <span class="muted">${c.name}</span></div>
      <div class="bar"><span style="width:${width}%"></span></div>
      <div><strong>${combined!==null?combined+"%":completion+"%"}</strong></div>
    </div>
    <p class="muted" style="margin:0 0 14px 0">Completion: ${s.done}/${s.possible || 0} · MC/Fill: ${quizScore===null?'—':quizScore+'%'} · Short answer: ${shortPct===null?'—':shortPct+'%'}</p>`;
  }).join("");
  document.getElementById("view").innerHTML = `
    <section class="card">
      <h2>Focus Tracker</h2>
      <p>This tracker uses your completed lessons, multiple-choice/fill-in attempts, and self-scored short answers. Use it to decide where to review rather than guessing.</p>
      ${rows}
    </section>
    <section class="card">
      <h2>Error Log Routine</h2>
      <ol>
        <li>Write the missed concept in your own words.</li>
        <li>Explain why the wrong answer was tempting.</li>
        <li>Write the corrected rule or idea.</li>
        <li>Create one new classroom example using that rule.</li>
      </ol>
    </section>`;
}

function renderSources(){
  document.getElementById("view").innerHTML = `
    <section class="card">
      <h2>Sources + Official Links</h2>
      <p>This course is aligned to public official NYSTCE and NYSED information. Use these links for registration, official practice materials, and regulation review.</p>
      ${DATA.sources.map(src=>`<div class="source card" style="box-shadow:none;margin:14px 0">
        <h3><a href="${src.url}" target="_blank" rel="noopener">${src.title}</a></h3>
        <p>${src.note}</p>
      </div>`).join("")}
      <p class="muted">Note: Do not copy or redistribute official NYSTCE copyrighted test materials. Use the official practice test and study guide for authentic formatting, then use this course for structured review and original practice.</p>
    </section>`;
}

function exportProgress(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "nystce-esol-116-progress.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function resetProgress(){
  if(confirm("Reset all lesson completion and assessment data?")){
    state = {lessons:{}, attempts:[]};
    saveState();
    renderDashboard();
  }
}
renderDashboard();
</script>
</body>
</html>
